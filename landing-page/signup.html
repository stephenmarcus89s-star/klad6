<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up — FrameForge</title>
<meta name="description" content="Create your free FrameForge account and start editing videos.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎬</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#08080e;--surface:#0e0e18;--glass:rgba(255,255,255,.04);
  --border:rgba(255,255,255,.07);--accent:#7c3aed;--accent2:#a78bfa;
  --text:#fff;--text2:rgba(255,255,255,.6);--text3:rgba(255,255,255,.35);
  --green:#10b981;--pink:#ec4899;
  --radius:16px;
}
html{scroll-behavior:smooth}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}

.gradient-bg{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.gradient-bg .blob{position:absolute;border-radius:50%;filter:blur(140px);opacity:.08}
.gradient-bg .blob:nth-child(1){width:500px;height:500px;background:#7c3aed;top:-10%;right:-10%}
.gradient-bg .blob:nth-child(2){width:400px;height:400px;background:#ec4899;bottom:-10%;left:-10%}

/* Nav */
.nav{padding:20px 5%;display:flex;align-items:center;position:relative;z-index:1}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:20px}
.brand .logo-icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--accent),var(--pink));display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 2px 16px rgba(124,58,237,.3)}
.brand span{background:linear-gradient(135deg,#fff 40%,rgba(255,255,255,.6));-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* Signup container */
.signup-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:40px 5%;position:relative;z-index:1}
.signup-card{width:100%;max-width:440px;background:var(--glass);border:1px solid var(--border);border-radius:24px;padding:48px 36px;backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px)}
.signup-card h1{font-size:28px;font-weight:800;margin-bottom:6px;letter-spacing:-.5px;text-align:center}
.signup-card .subtitle{text-align:center;color:var(--text2);font-size:14px;margin-bottom:32px}

.form-group{margin-bottom:20px}
.form-group label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px}
.form-group input{width:100%;padding:14px 16px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:12px;color:#fff;font-size:15px;font-family:inherit;outline:none;transition:border-color .2s}
.form-group input:focus{border-color:var(--accent)}
.form-group input::placeholder{color:var(--text3)}

.signup-btn{width:100%;padding:16px;background:linear-gradient(135deg,var(--accent),var(--pink));color:#fff;border:none;border-radius:14px;font-size:16px;font-weight:800;cursor:pointer;transition:all .2s;margin-top:8px}
.signup-btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(124,58,237,.3)}

.divider{display:flex;align-items:center;gap:16px;margin:24px 0;color:var(--text3);font-size:12px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}

.social-btn{width:100%;padding:14px;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:12px;color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:10px}
.social-btn:hover{border-color:rgba(255,255,255,.15);transform:translateY(-1px)}
.social-btn svg{width:20px;height:20px}

.login-link{text-align:center;margin-top:24px;font-size:13px;color:var(--text3)}
.login-link a{color:var(--accent2);font-weight:600}
.login-link a:hover{text-decoration:underline}

.terms-note{text-align:center;margin-top:16px;font-size:11px;color:var(--text3);line-height:1.6}
.terms-note a{color:var(--text2)}
.terms-note a:hover{text-decoration:underline}

.success-msg{display:none;text-align:center;padding:20px;font-size:15px;color:var(--green);font-weight:600}

@media(max-width:480px){
  .signup-card{padding:36px 24px;border-radius:20px}
}
</style>
</head>
<body>

<div class="gradient-bg">
  <div class="blob"></div>
  <div class="blob"></div>
</div>

<nav class="nav">
  <a href="/downloadapp" class="brand">
    <div class="logo-icon">🎬</div>
    <span>FrameForge</span>
  </a>
</nav>

<div class="signup-wrap">
  <div class="signup-card">
    <h1>Create your account</h1>
    <p class="subtitle">Start editing videos for free — no credit card needed</p>

    <form id="signupForm" onsubmit="handleSignup(event)">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" id="fullName" placeholder="John Doe" required autocomplete="name">
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="At least 8 characters" required minlength="8" autocomplete="new-password">
      </div>
      <button type="submit" class="signup-btn">Create Account</button>
    </form>

    <div class="divider">or continue with</div>

    <button class="social-btn" onclick="handleSignup(event)">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      Continue with Google
    </button>

    <div class="success-msg" id="successMsg">
      ✅ Account created! Redirecting to editor...
    </div>

    <p class="login-link">Already have an account? <a href="/downloadapp/signup">Log in</a></p>
    <p class="terms-note">By signing up, you agree to our <a href="/downloadapp/terms-global">Terms of Service</a> and <a href="/downloadapp/privacy-global">Privacy Policy</a></p>
  </div>
</div>

<script>
function handleSignup(e) {
  e.preventDefault();
  var form = document.getElementById('signupForm');
  var success = document.getElementById('successMsg');
  form.style.display = 'none';
  document.querySelectorAll('.social-btn, .divider, .login-link').forEach(function(el) { el.style.display = 'none'; });
  success.style.display = 'block';
  // Simulate redirect after 2s
  setTimeout(function() {
    success.textContent = '🎬 Setting up your workspace...';
  }, 2000);
  setTimeout(function() {
    success.textContent = '✅ Welcome to FrameForge! Your editor is ready.';
  }, 4000);
}
</script>
</body>
</html>
